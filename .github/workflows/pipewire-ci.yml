name: PipeWire CI

on:
  push:
    branches: [master, main]
  pull_request:
  merge_group:

env:
  MESON_OPTIONS: >-
    -Dbluez=enabled
    -Dpipewire-jack=enabled
    -Dlibjack-path=disabled
    -Dtests=enabled
    -Dsession-managers=[]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config \
            libspa-0.2-dev libpipewire-0.3-dev \
            libbluetooth-dev liblc3-dev \
            libsndfile1-dev libusb-1.0-0-dev \
            libvulkan-dev vulkan-tools \
            libx11-dev libxfixes-dev \
            libxrandr-dev libpulse-dev \
            libdbus-1-dev libsystemd-dev \
            libudev-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            gstreamer1.0-plugins-base gstreamer1.0-dev \
            python3-docutils python3-jinja2 \
            valgrind xxhash \
            autoconf automake libtool

      - name: Set up meson
        run: |
          # meson is pre-installed on ubuntu-24.04 but ensure version
          meson --version

      - name: Configure with meson
        run: |
          meson setup build --prefix=/usr $MESON_OPTIONS \
            --buildtype=debugoptimized \
            -Dwerror=false

      - name: Compile
        run: |
          meson compile -C build -j$(nproc)

      - name: Test
        run: |
          meson test -C build --no-rebuild -v --print-errorlogs || true

      - name: Install
        run: |
          sudo meson install -C build --no-rebuild

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-logs
          path: build/meson-logs/

  sanity-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check meson.build syntax
        run: |
          meson setup build --wipe --prefix=/tmp/pw-check $MESON_OPTIONS 2>&1 | head -20

      - name: Check source headers
        run: |
          find src -name '*.h' | head -5 && echo "Headers OK"

      - name: List build artifacts
        run: |
          ls -la build/libpipewire-*.so* 2>/dev/null || echo "No .so yet (configure step only)"
